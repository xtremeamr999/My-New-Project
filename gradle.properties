# Done to increase the memory available to gradle.
org.gradle.jvmargs=-Xmx4G
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.caching.debug=false
org.gradle.configureondemand=true

fabric_kotlin_version=1.13.1+kotlin.2.1.10

mod_version=0.4.1-beta
major_update_notes = v0.4 Update: New features! Order status highlights in bazaar orders screen, custom order for maxmimum you can afford, 

maven_group=com.github.mkram17.bazaarutils

modmenu_version=13.0.1
yacl_version=3.6.2
amecsreborn_version = 2.0.2
