description = Bazaar Utils is a QOL mod for the Bazaar. It has useful features like outdated order notifications, item bookmarks, custom buy order amount shortcuts, and more!
authors = mkram17
license = GPL-3
source_url = https://github.com/mkram17/Bazaar-Utils
website = https://modrinth.com/mod/bazaar-utils


#STONECUTTER
mod.version = mod_version
mod.id = bazaarutils
deps.core.mcVersion=[VERSIONED]

deps.core.mc.version_range=[VERSIONED]

